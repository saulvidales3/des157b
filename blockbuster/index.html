<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockbuster Video</title>

    <!-- normalization -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fascinate+Inline&family=Grand+Hotel&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <!-- style sheet -->
    <link href="styles.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- javascript -->
     <script src="script.js" defer></script>
</head>

<body>
    <i class="fa-solid fa-expand"></i>
    
    <main>
        <div class="mainvideo">
            <div class="poem">
                <p class="line1">Step by step</p>
                <p class="line2">Little by little</p>
                <p class="line3">Day by day</p>
                <p class="line4">Don't think about the future push forward</p>
                <p class="line5"> - Holly Danielle</p>
                
            </div>

            

            <video id="blockbuster" muted autoplay loop playsinline>
                <source src="media/blockbusterr.webm" type="video/webm">
                <source src="media/blockbusterr.mp4" type="video/mp4">

                <p>Your browser doesn't support HTML5 video. Here is a <a href="media/blockbuster.mp4">link</a> to the video instead.</p>
            </video>

            
        </div>
         
        
    </main>
    
</body>
</html>
